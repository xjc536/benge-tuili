<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本格推理馆</title>
<style>
:root{--bg:#070707;--card:#0f0f0f;--paper:#efe8d8;--accent:#9b1b30;--gold:#b8860b;--green:#3a7d44;--blue:#3a6d8d;--muted:#777;--border:#222;--serif:'Noto Serif SC','Songti SC','STSong',serif;--sans:'PingFang SC','Microsoft YaHei',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:#bbb;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;background-image:radial-gradient(ellipse at 30% 8%,rgba(155,27,48,.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(184,134,11,.03) 0%,transparent 50%)}
body::after{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L30 55 M5 30 L55 30' stroke='%23111' stroke-width='.3'/%3E%3C/svg%3E");opacity:.3;pointer-events:none;z-index:0}
.screen{display:none;position:relative;z-index:1;width:100%;max-width:800px}
.screen.active{display:block}

/* ── HOME ── */
.char-card{background:var(--card);border:1px solid var(--border);padding:28px 24px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
.char-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),transparent)}
.char-avatar{font-size:3.5rem;margin-bottom:8px;filter:drop-shadow(0 0 16px rgba(184,134,11,.3))}
.char-name{font-family:var(--serif);font-size:1.3rem;color:var(--paper);letter-spacing:3px;margin-bottom:2px}
.char-title{font-size:.75rem;color:var(--gold);letter-spacing:4px;font-family:var(--serif);margin-bottom:10px}
.char-stats{display:flex;justify-content:center;gap:28px;font-size:.8rem;color:var(--muted)}
.char-stats span{display:flex;align-items:center;gap:5px}
.char-stats b{color:var(--paper)}
.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:16px}
.case-item{background:var(--card);border:1px solid var(--border);padding:20px;cursor:pointer;transition:all .25s;text-align:left;position:relative}
.case-item:hover:not(.locked){border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,0,0,.5)}
.case-item.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.6)}
.case-item.solved{border-color:var(--green);opacity:.7}
.case-item.solved::after{content:'✓';position:absolute;top:10px;right:14px;color:var(--green);font-weight:700;font-size:1.2rem}
.case-item.current{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.case-icon{font-size:2rem;margin-bottom:8px}
.case-title{font-family:var(--serif);font-size:1rem;color:var(--paper);letter-spacing:1px;margin-bottom:6px}
.case-meta{font-size:.7rem;color:var(--muted);line-height:1.5}
.case-rating{font-size:.65rem;color:var(--gold);margin-top:5px}

/* ── CASE HEADER ── */
.case-header{background:var(--card);border:1px solid var(--border);padding:16px 20px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.case-header .title{font-family:var(--serif);font-size:1.1rem;color:var(--paper);letter-spacing:2px}
.stage-indicator{display:flex;gap:6px;align-items:center}
.stage-dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.stage-dot.done{background:var(--green)}
.stage-dot.current{background:var(--gold);box-shadow:0 0 10px var(--gold)}
.btn-leave{font-size:.7rem;background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;cursor:pointer;font-family:var(--serif);letter-spacing:1px;transition:all .2s}
.btn-leave:hover{color:var(--accent);border-color:var(--accent)}

/* ── STAGE PANEL ── */
.stage-panel{background:var(--card);border:1px solid var(--border);padding:26px 24px;margin-bottom:14px;animation:fadeIn .4s ease}
.stage-label{font-size:.65rem;letter-spacing:6px;color:var(--gold);margin-bottom:16px;font-family:var(--serif);text-transform:uppercase}
.stage-heading{font-family:var(--serif);font-size:1.15rem;color:var(--paper);margin-bottom:8px;letter-spacing:1px;line-height:1.5}
.stage-desc{font-size:.88rem;color:var(--muted);line-height:2;margin-bottom:18px}
.scene-box{background:#0a0a0a;border-left:3px solid var(--accent);padding:20px;margin:14px 0;font-family:var(--serif);line-height:2.2;font-size:.88rem;color:#aaa}
.scene-box .tag{display:inline-block;background:var(--accent);color:#fff;padding:3px 10px;font-size:.6rem;letter-spacing:3px;margin-bottom:10px}

/* ── CHOICES ── */
.choice-grid{display:grid;gap:9px;margin:16px 0}
.choice-btn{padding:15px 18px;border:1px solid var(--border);background:#0d0d0d;color:#bbb;cursor:pointer;font-size:.9rem;text-align:left;font-family:var(--serif);letter-spacing:.5px;transition:all .25s;display:flex;align-items:flex-start;gap:12px;line-height:1.6}
.choice-btn:hover:not(:disabled){border-color:var(--gold);background:#151515}
.choice-btn:disabled{opacity:.5;cursor:not-allowed}
.choice-btn .dot{flex-shrink:0;width:8px;height:8px;border-radius:50%;background:var(--border);margin-top:7px;transition:all .2s}
.choice-btn:hover:not(:disabled) .dot{background:var(--gold)}
.choice-btn.picked{border-color:var(--blue);background:#0a1218}
.choice-btn.picked .dot{background:var(--blue)}

/* ── CLUES ── */
.clue-block{background:#0a0a0a;border:1px solid #1a1a33;padding:18px 20px;margin:8px 0;font-size:.88rem;color:#bbb;line-height:2;animation:fadeIn .35s ease;border-left:2px solid var(--blue)}
.clue-tag{color:var(--blue);font-size:.65rem;letter-spacing:4px;margin-bottom:8px;font-family:var(--serif)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── ACCUSATION ── */
.suspect-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin:14px 0}
.suspect-card{padding:20px 16px;border:1px solid var(--border);background:#0d0d0d;cursor:pointer;text-align:center;transition:all .25s;font-family:var(--serif)}
.suspect-card:hover{border-color:var(--accent);background:#1a0a0a;transform:translateY(-2px)}
.suspect-card .s-avatar{font-size:2.2rem;margin-bottom:8px}

.suspect-card .s-name{color:var(--paper);font-size:1rem;margin-bottom:3px}
.suspect-card .s-role{font-size:.7rem;color:var(--muted)}

/* ── RESULT ── */
.result-panel{text-align:center;padding:32px 24px;background:var(--card);border:1px solid var(--border);margin-bottom:14px;animation:fadeIn .5s ease}
.result-rating{font-size:5rem;font-weight:900;font-family:var(--serif);margin:12px 0;line-height:1}
.result-rating.S{color:#f5c518;text-shadow:0 0 40px rgba(245,197,24,.5)}
.result-rating.A{color:var(--green);text-shadow:0 0 25px rgba(58,125,68,.4)}
.result-rating.B{color:var(--blue)}
.result-rating.C{color:var(--muted)}
.result-msg{font-size:1.1rem;color:var(--paper);font-family:var(--serif);letter-spacing:3px;margin-bottom:12px}
.result-detail{font-size:.82rem;color:var(--muted);line-height:2;margin-bottom:16px}
.truth-box{font-family:var(--serif);color:#bbb;line-height:2.1;font-size:.88rem;text-align:left;background:#0a0a0a;padding:20px;margin:14px 0;border:1px solid var(--border);border-left:3px solid var(--gold)}
.truth-box b{color:var(--gold)}

/* ── BUTTONS ── */
.btn{padding:11px 24px;border:1px solid var(--border);cursor:pointer;font-size:.82rem;font-family:var(--serif);letter-spacing:2px;background:transparent;color:var(--muted);transition:all .25s;display:inline-block}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-go{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-go:hover{background:#b01d38;color:#fff}
.btn-continue{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.btn-continue:hover{background:#d4a00a;color:#000}
.btn-hint{font-size:.75rem;padding:8px 16px}

/* ── TOAST / CONFETTI ── */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--gold);color:var(--gold);padding:12px 28px;font-family:var(--serif);letter-spacing:2px;font-size:.8rem;z-index:999;animation:toastIn .3s ease,toastOut .3s ease 1.8s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-24px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.confetti{position:fixed;pointer-events:none;z-index:999;font-size:2rem;animation:drop 2s ease forwards}
@keyframes drop{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* ── MOBILE ── */
@media(max-width:500px){
  .case-grid{grid-template-columns:1fr}
  .suspect-grid{grid-template-columns:1fr 1fr}
  .stage-panel{padding:16px 14px}
  .truth-box{padding:14px}
}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <div class="char-card">
    <div class="char-avatar">🕵️</div>
    <div class="char-name" id="charName">侦探</div>
    <div class="char-title" id="charTitle">见习探员</div>
    <div class="char-stats">
      <span>⭐ <b id="homeScore">0</b> 分</span>
      <span>📋 <b id="homeSolved">0</b>/6 已破</span>
      <span>🏆 <b id="homeBest">-</b></span>
    </div>
  </div>
  <div class="case-grid" id="caseGrid"></div>
</div>

<!-- CASE -->
<div class="screen" id="caseScreen">
  <div class="case-header">
    <div>
      <div class="title" id="caseName"></div>
    </div>
    <div class="stage-indicator" id="stageDots"></div>
    <button class="btn-leave" onclick="abandonCase()">放弃案件</button>
  </div>
  <div id="caseContent"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const P={score:0,solved:{},currentCase:null,currentStage:0,cluesFound:[],wrongAccusations:0,hintsUsed:0,choices:{},startedCases:{}};
const RANKS=[{min:0,title:'见习探员',icon:'🔍'},{min:100,title:'初级探员',icon:'📋'},{min:260,title:'中级探员',icon:'🔎'},{min:500,title:'高级探员',icon:'🎩'},{min:850,title:'资深探员',icon:'🏅'},{min:1300,title:'首席神探',icon:'👑'},{min:1900,title:'传奇侦探',icon:'🌟'}];
function rank(){for(let i=RANKS.length-1;i>=0;i--)if(P.score>=RANKS[i].min)return RANKS[i];return RANKS[0]}

// ═══════════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════════
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function refreshHome(){
  const r=rank();document.getElementById('charName').textContent=r.icon+' 侦探';document.getElementById('charTitle').textContent=r.title;document.getElementById('homeScore').textContent=P.score;
  const c=Object.keys(P.solved).length;document.getElementById('homeSolved').textContent=c;document.getElementById('homeBest').textContent=c>0?Object.values(P.solved).sort()[0]+'级':'-';
  renderGrid();
}
function renderGrid(){
  document.getElementById('caseGrid').innerHTML=CASES.map(ca=>{
    const s=P.solved[ca.id],a=P.currentCase===ca.id,l=P.currentCase!==null&&P.currentCase!==ca.id;
    let cl='case-item';if(s)cl+=' solved';if(a)cl+=' current';if(l)cl+=' locked';
    return`<div class="${cl}" onclick="startCase('${ca.id}')"><div class="case-icon">${ca.icon}</div><div class="case-title">${ca.title}</div><div class="case-meta">难度 ${ca.difficulty} · ${ca.stages.length}阶段<br>${ca.tagline}</div>${s?`<div class="case-rating">已破·评级 ${s}</div>`:''}${a?`<div class="case-rating" style="color:var(--accent)">进行中…</div>`:''}</div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════
// CASE ENGINE
// ═══════════════════════════════════════════════════
function startCase(id){
  if(P.currentCase&&P.currentCase!==id){toast('请先完成当前案件');return}
  if(P.solved[id]){toast('此案已侦破');return}
  P.currentCase=id;P.currentStage=0;P.cluesFound=[];P.wrongAccusations=0;P.hintsUsed=0;P.choices={};
  showScreen('caseScreen');renderStage();refreshHome();
}
function abandonCase(){
  if(!confirm('确定放弃此案？已获得的线索将全部丢失，且此案将永久锁定无法重开。'))return;
  P.startedCases[P.currentCase]=true;P.currentCase=null;showScreen('homeScreen');refreshHome();toast('案件已放弃。此案永久不可再开。');
}
function renderStage(){
  const ca=CASES.find(x=>x.id===P.currentCase);if(!ca)return;
  document.getElementById('caseName').textContent=ca.icon+' '+ca.title;
  document.getElementById('stageDots').innerHTML=ca.stages.map((_,i)=>{let cl='stage-dot';if(i<P.currentStage)cl+=' done';if(i===P.currentStage)cl+=' current';return`<span class="${cl}"></span>`;}).join('');
  const st=ca.stages[P.currentStage];
  let h=`<div class="stage-panel"><div class="stage-label">阶段 ${P.currentStage+1}/${ca.stages.length} · ${st.label}</div><div class="stage-heading">${st.heading}</div><div class="stage-desc">${st.desc}</div>`;
  if(st.scene)h+=`<div class="scene-box"><span class="tag">现场报告</span><br>${st.scene}</div>`;
  if(st.choices){h+=`<div class="choice-grid">`;st.choices.forEach((ch,i)=>{const pk=P.choices[st.id]?.includes(i);h+=`<button class="choice-btn${pk?' picked':''}" onclick="pick('${st.id}',${i},'${ca.id}')" ${pk?'disabled':''}><span class="dot"></span><span>${ch.label}</span></button>`;});h+=`</div>`;}
  if(P.cluesFound.length>0){P.cluesFound.forEach(cl=>{h+=`<div class="clue-block"><div class="clue-tag">🔍 发现线索</div>${cl}</div>`;});}
  if(st.type==='accusation'){h+=`<div class="suspect-grid">`;ca.suspects.forEach((s,i)=>{h+=`<div class="suspect-card" onclick="accuse('${ca.id}',${i})"><div class="s-avatar">${s.avatar}</div><div class="s-name">${s.name}</div><div class="s-role">${s.role}</div></div>`;});h+=`</div>`;}
  h+=`<div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;">`;
  if(st.hint)h+=`<button class="btn btn-hint" onclick="useHint('${ca.id}')">💡 提示</button>`;
  if(st.canContinue||(P.choices[st.id]&&st.type!=='accusation'))h+=`<button class="btn btn-go" onclick="advanceStage('${ca.id}')">继续 →</button>`;
  h+=`</div></div>`;document.getElementById('caseContent').innerHTML=h;
}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2100);}
function useHint(id){P.hintsUsed++;const st=CASES.find(x=>x.id===id).stages[P.currentStage];toast('💡 '+st.hint)}
function pick(sid,idx,cid){
  if(!P.choices[sid])P.choices[sid]=[];if(P.choices[sid].includes(idx))return;P.choices[sid].push(idx);
  const ca=CASES.find(x=>x.id===cid),st=ca.stages[P.currentStage],ch=st.choices[idx];
  if(ch.clue&&!P.cluesFound.includes(ch.clue))P.cluesFound.push(ch.clue);
  if(ch.effect==='wrong_path')P.wrongAccusations++;
  renderStage();
}
function advanceStage(id){P.currentStage++;if(P.currentStage>=CASES.find(x=>x.id===id).stages.length){finish(id,'B');return}renderStage()}
function accuse(id,si){
  const ca=CASES.find(x=>x.id===id);
  if(si===ca.culprit){
    let r='C';const need=ca.stages.filter(s=>s.type!=='accusation').length,got=Math.min(P.cluesFound.length,need),ratio=got/need;
    if(P.wrongAccusations===0&&P.hintsUsed===0&&ratio>=0.75)r='S';else if(P.wrongAccusations===0&&P.hintsUsed<=1&&ratio>=0.5)r='A';else if(P.wrongAccusations<=1&&ratio>=0.3)r='B';
    finish(id,r);
  }else{P.wrongAccusations++;toast('❌ 不对。重新审视线索。');renderStage()}
}
function finish(id,rating){
  P.solved[id]=rating;const scores={S:150,A:100,B:55,C:25};P.score+=scores[rating]+(P.hintsUsed===0?20:0);
  const msgs={S:'完美推理！真相纤毫毕现。',A:'出色的侦破！凶手无所遁形。',B:'基本过关。案件告破。',C:'勉强过关。还需精进。'};
  const det={S:'你找到了几乎所有关键线索，推理路径毫无偏差。每一处细节都被你串联起来，形成了完整的证据链。',A:'推理方向正确，只在少数环节有所遗漏。但证据链足够牢靠，凶手已被锁定。',B:'虽然走过一些弯路，某些线索没有找到，但核心推理没有偏离。案件最终得以告破。',C:'磕磕绊绊，错漏不少。但你最终还是指认了真凶。下次需要更仔细地勘察现场——细节从来不在别处，就在你眼前。'};
  const ca=CASES.find(x=>x.id===id);
  document.getElementById('caseContent').innerHTML=`
    <div class="result-panel"><div>案件终结 — ${ca.icon} ${ca.title}</div><div class="result-rating ${rating}">${rating}</div><div class="result-msg">${msgs[rating]}</div><div class="result-detail">${det[rating]}<br><br>获得分数 <b style="color:var(--gold)">+${scores[rating]+(P.hintsUsed===0?20:0)}</b></div><div class="truth-box"><b>【真相揭示】</b><br><br>${ca.truth}</div><button class="btn btn-continue" onclick="returnHome()">返回侦探事务所 →</button></div>`;
  document.getElementById('stageDots').innerHTML='';
  if(rating==='S'||rating==='A')spawnConfetti();
  P.currentCase=null;refreshHome();
}
function returnHome(){showScreen('homeScreen');refreshHome()}
function spawnConfetti(){const e=['🎉','✨','🏆','🎩','💎','⭐','🔥','👑'];for(let i=0;i<24;i++)setTimeout(()=>{const d=document.createElement('div');d.className='confetti';d.textContent=e[Math.floor(Math.random()*e.length)];d.style.left=Math.random()*100+'%';d.style.animationDuration=(1.5+Math.random()*1.8)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),3500);},i*70)}

// ═══════════════════════════════════════════════════
// CASES — 完整的案件数据
// ═══════════════════════════════════════════════════
const CASES=[

// ── CASE 1: 占星术 ──────────────────────────
(function(){const ca={
  id:'zodiac',icon:'🔮',title:'占星术连环杀人',difficulty:'★★★',tagline:'六具尸体·十二星座·全国抛尸',
  stages:[
    {id:'z1',label:'现场勘查',type:'investigate',
     heading:'第一日·雪原中的头颅',
     desc:'十二月三日，黑龙江漠河。一位鄂温克族猎人在雪原上发现了一个黑色塑料袋。他本以为是被丢弃的猎物内脏——打开之后，里面是一颗年轻女性的头颅。法医鉴定确认：死亡时间在四十八小时前，头颅被专业手术刀从颈椎第四节处精确切断。切口平滑，显示操作者具备解剖学知识。<br><br>猎人称，头颅被放置在一个直径约五米的同心圆图案中心——十二圈足迹，从外向内逐步收窄，最内一圈恰好围绕着头颅。在北极圈的星空下，这个图案让人不寒而栗。<br><br>一周之内，河南洛阳、陕西秦岭、四川成都、云南大理、广东广州——全国六座城市分别发现了同一名女性的不同身体部位。每个现场都留下了与星座相关的标记符号。媒体将其命名为"占星术连环杀人案"。<br><br>你是案件负责探员。你现在站在漠河雪原上，面对十二圈同心圆足迹。你决定从哪里开始？',
     scene:'漠河·北纬53度。气温零下三十八度。雪地上十二圈同心圆足迹清晰可辨——每一圈都精确地与上一圈保持约四十厘米的距离，仿佛用圆规画出。头颅被包裹在黑色塑料袋中，袋口朝向正北——北斗星的方向。塑料袋上没有任何指纹，但袋口扎绳的打结方式是一种罕见的"水手结"。',
     choices:[

    {id:'z2',label:'嫌疑人调查',type:'interrogate',

     choices:[

    {id:'z3',label:'线索整合',type:'synthesis',
     heading:'第七日·拼图的关键',
     desc:'你已经有足够证据证明六名受害者是被一个有组织的团体杀害的。天文学理论（段星河）、宗教仪式场地（苏晓星）、目标筛选（秦漠）——三条线交汇在一起。<br><br>但现在你必须做出一个关键判断：这三个人中，谁是主导者？谁是从属？谁可能只是被利用的工具？这个判断将决定你最终指控的对象。',
     scene:'专案组会议室。白板上密布着三人的照片、证词摘要、物证照片。红笔圈出了三条交叉线：①段星河→学术理论→星象投射计算；②苏晓星→仪式场地→地下室血迹；③秦漠→目标筛选→社交媒体接触记录。三条线的交汇点上，贴着一张便签纸，上面是段星河被撕去的那一页笔记的压痕复原图——一个由六个人体部位拼成的完整人形，下方一行字："完全人=神。此三者皆我之器。"',
