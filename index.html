<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本格推理馆</title>
<style>
:root{--bg:#080808;--card:#111;--paper:#efe8d8;--accent:#9b1b30;--gold:#b8860b;--green:#3a7d44;--blue:#3a6d8d;--muted:#777;--border:#2a2a2a;--serif:'Noto Serif SC','Songti SC','STSong',serif;--sans:'PingFang SC','Microsoft YaHei',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:#bbb;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;background-image:radial-gradient(ellipse at 30% 10%,rgba(155,27,48,.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(184,134,11,.03) 0%,transparent 50%)}
body::after{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L30 55 M5 30 L55 30' stroke='%23111' stroke-width='.3'/%3E%3C/svg%3E");opacity:.3;pointer-events:none;z-index:0}

/* ── SCREENS ── */
.screen{display:none;position:relative;z-index:1;width:100%;max-width:760px}
.screen.active{display:block}

/* ── HOME: Character Card ── */
.char-card{background:var(--card);border:1px solid var(--border);padding:28px 24px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
.char-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),transparent)}
.char-avatar{font-size:3.5rem;margin-bottom:8px;filter:drop-shadow(0 0 16px rgba(184,134,11,.3))}
.char-name{font-family:var(--serif);font-size:1.3rem;color:var(--paper);letter-spacing:3px;margin-bottom:2px}
.char-title{font-size:.75rem;color:var(--gold);letter-spacing:4px;font-family:var(--serif);margin-bottom:10px}
.char-stats{display:flex;justify-content:center;gap:24px;font-size:.8rem;color:var(--muted)}
.char-stats span{display:flex;align-items:center;gap:4px}
.char-stats b{color:var(--paper)}

/* ── HOME: Case Grid ── */
.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.case-item{background:var(--card);border:1px solid var(--border);padding:18px;cursor:pointer;transition:all .25s;text-align:left;position:relative}
.case-item:hover:not(.locked){border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4)}
.case-item.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.5)}
.case-item.solved{border-color:var(--green);opacity:.7}
.case-item.solved::after{content:'✓';position:absolute;top:8px;right:12px;color:var(--green);font-weight:700;font-size:1.2rem}
.case-item.current{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.case-icon{font-size:1.8rem;margin-bottom:6px}
.case-title{font-family:var(--serif);font-size:.95rem;color:var(--paper);letter-spacing:1px;margin-bottom:4px}
.case-meta{font-size:.7rem;color:var(--muted)}
.case-rating{font-size:.65rem;color:var(--gold);margin-top:4px}

/* ── CASE SCREEN ── */
.case-header{background:var(--card);border:1px solid var(--border);padding:18px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.case-header .title{font-family:var(--serif);font-size:1.1rem;color:var(--paper);letter-spacing:2px}
.case-header .stage-indicator{display:flex;gap:6px}
.case-header .stage-dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.case-header .stage-dot.done{background:var(--green)}
.case-header .stage-dot.current{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.case-header .btn-leave{font-size:.7rem;background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;cursor:pointer;font-family:var(--serif);letter-spacing:1px;transition:all .2s}
.case-header .btn-leave:hover{color:var(--accent);border-color:var(--accent)}

/* ── Stage content ── */
.stage-panel{background:var(--card);border:1px solid var(--border);padding:22px;margin-bottom:12px;animation:fadeIn .35s ease}
.stage-label{font-size:.65rem;letter-spacing:5px;color:var(--gold);margin-bottom:14px;font-family:var(--serif);text-transform:uppercase}
.stage-heading{font-family:var(--serif);font-size:1.05rem;color:var(--paper);margin-bottom:6px;letter-spacing:1px}
.stage-desc{font-size:.85rem;color:var(--muted);line-height:1.8;margin-bottom:16px}
.scene-box{background:#0d0d0d;border-left:3px solid var(--accent);padding:16px;margin:12px 0;font-family:var(--serif);line-height:2;font-size:.88rem;color:#aaa}
.scene-box .tag{display:inline-block;background:var(--accent);color:#fff;padding:2px 8px;font-size:.6rem;letter-spacing:2px;margin-bottom:8px}
.choice-grid{display:grid;gap:8px;margin:14px 0}
.choice-btn{padding:14px 16px;border:1px solid var(--border);background:#0f0f0f;color:#bbb;cursor:pointer;font-size:.9rem;text-align:left;font-family:var(--serif);letter-spacing:1px;transition:all .2s;display:flex;align-items:flex-start;gap:10px}
.choice-btn:hover:not(:disabled){border-color:var(--gold);background:#181818}
.choice-btn:disabled{opacity:.5;cursor:not-allowed}
.choice-btn .dot{flex-shrink:0;width:8px;height:8px;border-radius:50%;background:var(--border);margin-top:6px}
.choice-btn:hover:not(:disabled) .dot{background:var(--gold)}
.choice-btn.picked{border-color:var(--blue);background:#0a1218}
.choice-btn.picked .dot{background:var(--blue)}

/* ── Clue reveal ── */
.clue-reveal{background:#0d0d0d;border:1px solid #1a1a3a;padding:14px 16px;margin:8px 0;font-size:.85rem;color:#bbb;line-height:1.7;animation:fadeIn .3s ease;border-left:2px solid var(--blue)}
.clue-reveal .clue-name{color:var(--blue);font-size:.65rem;letter-spacing:3px;margin-bottom:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── Accusation ── */
.suspect-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin:12px 0}
.suspect-card{padding:16px;border:1px solid var(--border);background:#0f0f0f;cursor:pointer;text-align:center;transition:all .2s;font-family:var(--serif)}
.suspect-card:hover{border-color:var(--accent);background:#1a0a0a}
.suspect-card .s-avatar{font-size:2rem;margin-bottom:6px}
.suspect-card .s-name{color:var(--paper);font-size:.95rem;margin-bottom:2px}

/* ── Result / Rating ── */
.result-panel{text-align:center;padding:24px;background:var(--card);border:1px solid var(--border);margin-bottom:12px;animation:fadeIn .5s ease}
.result-rating{font-size:4rem;font-weight:900;font-family:var(--serif);margin:10px 0}
.result-rating.S{color:#f5c518;text-shadow:0 0 30px rgba(245,197,24,.5)}
.result-rating.A{color:var(--green);text-shadow:0 0 20px rgba(58,125,68,.4)}
.result-rating.B{color:var(--blue)}
.result-rating.C{color:var(--muted)}
.result-msg{font-size:1rem;color:var(--paper);font-family:var(--serif);letter-spacing:2px;margin-bottom:10px}
.result-detail{font-size:.8rem;color:var(--muted);line-height:1.8;margin-bottom:14px}

/* ── Buttons ── */
.btn{padding:10px 22px;border:1px solid var(--border);cursor:pointer;font-size:.8rem;font-family:var(--serif);letter-spacing:2px;background:transparent;color:var(--muted);transition:all .2s;display:inline-block}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-go{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-go:hover{background:#b01d38;color:#fff}
.btn-continue{background:var(--gold);color:#000;border-color:var(--gold)}
.btn-continue:hover{background:#d4a00a;color:#000}

/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--gold);color:var(--gold);padding:10px 24px;font-family:var(--serif);letter-spacing:2px;font-size:.8rem;z-index:999;animation:toastIn .3s ease,toastOut .3s ease 1.7s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.confetti{position:fixed;pointer-events:none;z-index:999;font-size:2rem;animation:drop 2s ease forwards}
@keyframes drop{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* ── Mobile ── */
@media(max-width:500px){
  .case-grid{grid-template-columns:1fr}
  .char-avatar{font-size:2.5rem}
  .suspect-grid{grid-template-columns:1fr 1fr}
  .stage-panel{padding:14px}
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="screen active" id="homeScreen">
  <div class="char-card">
    <div class="char-avatar">🕵️</div>
    <div class="char-name" id="charName">你</div>
    <div class="char-title" id="charTitle">见习探员</div>
    <div class="char-stats">
      <span>⭐ <b id="homeScore">0</b> 分</span>
      <span>📋 <b id="homeSolved">0</b>/6 案</span>
      <span>🏆 <b id="homeBest">-</b></span>
    </div>
  </div>
  <div class="case-grid" id="caseGrid"></div>
</div>

<!-- CASE SCREEN -->
<div class="screen" id="caseScreen">
  <div class="case-header">
    <div>
      <div class="title" id="caseName">案件名</div>
    </div>
    <div class="stage-indicator" id="stageDots"></div>
    <button class="btn-leave" onclick="abandonCase()" title="放弃当前案件">放弃</button>
  </div>
  <div id="caseContent"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// 全局状态
// ═══════════════════════════════════════════════════
const P = {
  score: 0,
  solved: {},       // {caseId: 'S'|'A'|'B'|'C'}
  currentCase: null,
  currentStage: 0,
  cluesFound: [],
  wrongAccusations: 0,
  hintsUsed: 0,
  choices: {},      // stage choices made
  startedCases: {}, // set of caseIds that have been started (for locking)
};

const RANKS = [
  {min:0,   title:'见习探员',   icon:'🔍'},
  {min:80,  title:'初级探员',   icon:'📋'},
  {min:200, title:'中级探员',   icon:'🔎'},
  {min:400, title:'高级探员',   icon:'🎩'},
  {min:700, title:'资深探员',   icon:'🏅'},
  {min:1100,title:'首席神探',   icon:'👑'},
  {min:1600,title:'传奇侦探',   icon:'🌟'},
];

function getRank(){
  for(let i=RANKS.length-1;i>=0;i--)if(P.score>=RANKS[i].min)return RANKS[i];
  return RANKS[0];
}

// ═══════════════════════════════════════════════════
// 屏幕切换
// ═══════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function refreshHome(){
  const r=getRank();
  document.getElementById('charName').textContent=r.icon+' 侦探';
  document.getElementById('charTitle').textContent=r.title;
  document.getElementById('homeScore').textContent=P.score;
  const solvedCount=Object.keys(P.solved).length;
  document.getElementById('homeSolved').textContent=solvedCount;
  document.getElementById('homeBest').textContent=solvedCount>0?Object.values(P.solved).sort()[0]+'级':'-';
  renderCaseGrid();
}
function renderCaseGrid(){
  const grid=document.getElementById('caseGrid');
  grid.innerHTML=CASES.map(c=>{
    const solved=P.solved[c.id];
    const active=P.currentCase===c.id;
    const locked=P.currentCase!==null&&P.currentCase!==c.id;
    let cls='case-item';
    if(solved)cls+=' solved';
    if(active)cls+=' current';
    if(locked)cls+=' locked';
    return`<div class="${cls}" onclick="startCase('${c.id}')">
      <div class="case-icon">${c.icon}</div>
      <div class="case-title">${c.title}</div>
      <div class="case-meta">难度：${c.difficulty} | ${c.stages.length}个阶段</div>
      ${solved?`<div class="case-rating">评级：${solved}</div>`:''}
      ${active?`<div class="case-rating" style="color:var(--accent)">进行中…</div>`:''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════
// 案件系统
// ═══════════════════════════════════════════════════
function startCase(id){
  if(P.currentCase&&P.currentCase!==id){toast('请先完成当前案件');return}
  if(P.solved[id]){toast('此案已侦破');return}
  P.currentCase=id;
  P.currentStage=0;P.cluesFound=[];P.wrongAccusations=0;P.hintsUsed=0;P.choices={};
  showScreen('caseScreen');
  renderCaseStage();
  refreshHome();
}
function abandonCase(){
  if(!confirm('确定放弃当前案件？已有进度将丢失，且无法再选此案。'))return;
  const id=P.currentCase;
  P.startedCases[id]=true;
  P.currentCase=null;
  showScreen('homeScreen');
  refreshHome();
  toast('案件已放弃。此案件永久锁定。');
}
function renderCaseStage(){
  const c=CASES.find(x=>x.id===P.currentCase);
  if(!c)return;
  document.getElementById('caseName').textContent=c.icon+' '+c.title;
  // Stage dots
  const dots=document.getElementById('stageDots');
  dots.innerHTML=c.stages.map((_,i)=>{
    let cls='stage-dot';
    if(i<P.currentStage)cls+=' done';
    if(i===P.currentStage)cls+=' current';
    return`<span class="${cls}"></span>`;
  }).join('');
  // Content
  const stage=c.stages[P.currentStage];
  document.getElementById('caseContent').innerHTML=renderStage(stage,c);
}
function renderStage(stage,c){
  let html=`<div class="stage-panel">
    <div class="stage-label">阶段 ${P.currentStage+1}/${c.stages.length} · ${stage.label}</div>
    <div class="stage-heading">${stage.heading}</div>
    <div class="stage-desc">${stage.desc}</div>`;
  if(stage.scene)html+=`<div class="scene-box"><span class="tag">现场</span><br>${stage.scene}</div>`;
  if(stage.choices){
    html+=`<div class="choice-grid">`;
    stage.choices.forEach((ch,i)=>{
      const picked=P.choices[stage.id]?.includes(i);
      html+=`<button class="choice-btn${picked?' picked':''}" onclick="makeChoice('${stage.id}',${i},'${c.id}')" ${picked?'disabled':''}>
        <span class="dot"></span><span>${ch.label}</span></button>`;
    });
    html+=`</div>`;
  }
  // Show discovered clues
  if(P.cluesFound.length>0){
    html+=`<div style="margin-top:10px">`;
    P.cluesFound.forEach(cl=>{
      html+=`<div class="clue-reveal"><div class="clue-name">发现线索</div>${cl}</div>`;
    });
    html+=`</div>`;
  }
  // Accusation stage
  if(stage.type==='accusation'){
    html+=`<div class="suspect-grid">`;
    c.suspects.forEach((s,i)=>{
      html+=`<div class="suspect-card" onclick="accuse('${c.id}',${i})">
        <div class="s-avatar">${s.avatar}</div>
        <div class="s-name">${s.name}</div>
        <div style="font-size:.7rem;color:var(--muted)">${s.role}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  // Continue / hint buttons
  html+=`<div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">`;
  if(stage.hint){
    html+=`<button class="btn" onclick="useHint('${c.id}')">💡 提示</button>`;
  }
  if(stage.canContinue||P.choices[stage.id]){
    html+=`<button class="btn btn-go" onclick="advanceStage('${c.id}')">继续 →</button>`;
  }
  html+=`</div></div>`;
  return html;
}

function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
}
function useHint(id){
  P.hintsUsed++;
  const c=CASES.find(x=>x.id===id);
  const stage=c.stages[P.currentStage];
  toast('💡 '+stage.hint);
}

function makeChoice(stageId,idx,caseId){
  if(!P.choices[stageId])P.choices[stageId]=[];
  if(P.choices[stageId].includes(idx))return;
  P.choices[stageId].push(idx);
  const c=CASES.find(x=>x.id===caseId);
  const stage=c.stages[P.currentStage];
  const ch=stage.choices[idx];
  if(ch.clue){
    if(!P.cluesFound.includes(ch.clue))P.cluesFound.push(ch.clue);
  }
  if(ch.effect){
    if(ch.effect==='wrong_path')P.wrongAccusations++;
  }
  renderCaseStage();
}

function advanceStage(id){
  const c=CASES.find(x=>x.id===id);
  P.currentStage++;
  if(P.currentStage>=c.stages.length){
    // Shouldn't happen normally - accusation is handled separately
    finishCase(id,'B');
    return;
  }
  renderCaseStage();
}

function accuse(id,suspectIdx){
  const c=CASES.find(x=>x.id===id);
  const correct=suspectIdx===c.culprit;
  if(correct){
    // Calculate rating
    let rating='C';
    const cluesNeeded=c.stages.filter(s=>s.type!=='accusation').length;
    const cluesGot=Math.min(P.cluesFound.length,cluesNeeded);
    const ratio=cluesGot/cluesNeeded;
    if(P.wrongAccusations===0&&P.hintsUsed===0&&ratio>=0.8)rating='S';
    else if(P.wrongAccusations===0&&P.hintsUsed<=1&&ratio>=0.6)rating='A';
    else if(P.wrongAccusations<=1&&ratio>=0.4)rating='B';
    else rating='C';
    finishCase(id,rating);
  }else{
    P.wrongAccusations++;
    toast('❌ 不对，再想想');
    renderCaseStage();
  }
}

function finishCase(id,rating){
  P.solved[id]=rating;
  const baseScores={S:120,A:80,B:45,C:20};
  const bonus=P.hintsUsed===0?15:0;
  P.score+=baseScores[rating]+bonus;
  const c=CASES.find(x=>x.id===id);
  // Show result
  const ratingMsgs={S:'完美推理！',A:'出色的侦破！',B:'基本正确',C:'勉强过关'};
  const ratingDetails={
    S:'你发现了所有关键线索，没有犯任何错误。还原了整个真相。',
    A:'推理方向正确，只遗漏了少量细节。凶手已落网。',
    B:'虽然走了些弯路，但最终指认成功。案件告破。',
    C:'磕磕绊绊，但你还是找到了真凶。下次需要更谨慎。'
  };
  document.getElementById('caseContent').innerHTML=`
    <div class="result-panel">
      <div>案件终结</div>
      <div class="result-rating ${rating}">${rating}</div>
      <div class="result-msg">${ratingMsgs[rating]}</div>
      <div class="result-detail">${ratingDetails[rating]}<br>分数 +${baseScores[rating]+bonus}</div>
      <div style="font-family:var(--serif);color:var(--paper);line-height:1.9;font-size:.85rem;text-align:left;background:#0d0d0d;padding:14px;margin:12px 0;border:1px solid var(--border)">
        <b style="color:var(--gold)">真相：</b>${c.truth}
      </div>
      <button class="btn btn-continue" onclick="returnHome()">返回侦探事务所 →</button>
    </div>`;
  document.getElementById('stageDots').innerHTML='';
  // Confetti for S/A
  if(rating==='S'||rating==='A')spawnConfetti();
  P.currentCase=null;
  refreshHome();
}

function returnHome(){
  showScreen('homeScreen');
  refreshHome();
}

function spawnConfetti(){
  const emojis=['🎉','✨','🏆','🎩','💎','⭐','🔥','👑'];
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const e=document.createElement('div');e.className='confetti';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.left=Math.random()*100+'%';
      e.style.animationDuration=(1.5+Math.random()*1.5)+'s';
      document.body.appendChild(e);
      setTimeout(()=>e.remove(),3000);
    },i*80);
  }
}

// ═══════════════════════════════════════════════════
// 案件数据
// ═══════════════════════════════════════════════════
const CASES=[

// ── 案件1：占星术 ──────────────────────────────
{
  id:'zodiac',icon:'🔮',title:'占星术杀人',difficulty:'★★★',
  stages:[
    {id:'z1',label:'现场勘查',type:'investigate',heading:'选择勘查方向',
     desc:'六名年轻女性的尸块被分散抛弃在全国各地。你需要决定首先调查什么。',
     scene:'漠河雪原中发现第一个受害者的头部。周围积雪上有一圈圈同心圆足迹。洛阳、大理、成都……另外五处现场同样离奇。每处现场都以星座符号标记。',
     choices:[
