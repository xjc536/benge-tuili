<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本格推理馆</title>
<style>
:root{--bg:#070707;--card:#0e0e0e;--paper:#e8e0d0;--accent:#9b1b30;--gold:#b8860b;--green:#3a7d44;--blue:#3a6d8d;--muted:#777;--border:#222;--serif:'Noto Serif SC','Songti SC','STSong',serif;--sans:'PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:#bbb;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;background-image:radial-gradient(ellipse at 30% 8%,rgba(155,27,48,.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(184,134,11,.03) 0%,transparent 50%)}
body::after{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L30 55 M5 30 L55 30' stroke='%23111' stroke-width='.3'/%3E%3C/svg%3E");opacity:.3;pointer-events:none;z-index:0}

/* Screens */
.screen{display:none;position:relative;z-index:1;width:100%;max-width:820px}
.screen.active{display:block}

/* ── HOME ── */
.char-card{background:var(--card);border:1px solid var(--border);padding:28px 24px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
.char-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),transparent)}
.char-avatar{font-size:3.5rem;margin-bottom:8px;filter:drop-shadow(0 0 16px rgba(184,134,11,.3))}
.char-name{font-family:var(--serif);font-size:1.3rem;color:var(--paper);letter-spacing:3px;margin-bottom:2px}
.char-title{font-size:.75rem;color:var(--gold);letter-spacing:4px;font-family:var(--serif);margin-bottom:10px}
.char-stats{display:flex;justify-content:center;gap:28px;font-size:.8rem;color:var(--muted)}
.char-stats span{display:flex;align-items:center;gap:5px}
.char-stats b{color:var(--paper)}

.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:16px}
.case-item{background:var(--card);border:1px solid var(--border);padding:20px;cursor:pointer;transition:all .25s;text-align:left;position:relative}
.case-item:hover:not(.locked){border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,0,0,.5)}
.case-item.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.6)}
.case-item.solved{border-color:var(--green);opacity:.7}
.case-item.solved::after{content:'✓';position:absolute;top:10px;right:14px;color:var(--green);font-weight:700;font-size:1.2rem}
.case-item.current{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.case-icon{font-size:2rem;margin-bottom:8px}
.case-title{font-family:var(--serif);font-size:1rem;color:var(--paper);letter-spacing:1px;margin-bottom:6px}
.case-meta{font-size:.7rem;color:var(--muted);line-height:1.5}

/* ── CASE HEADER ── */
.case-header{background:var(--card);border:1px solid var(--border);padding:14px 20px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.case-header .title{font-family:var(--serif);font-size:1rem;color:var(--paper);letter-spacing:2px}
.progress-bar{display:flex;align-items:center;gap:4px}
.progress-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.progress-dot.visited{background:#444}
.progress-dot.current{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.btn-leave{font-size:.7rem;background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;cursor:pointer;font-family:var(--serif);letter-spacing:1px;transition:all .2s}
.btn-leave:hover{color:var(--accent);border-color:var(--accent)}

/* ── BEAT PANEL ── */
.beat-panel{background:var(--card);border:1px solid var(--border);padding:28px 26px;margin-bottom:14px;animation:slideUp .25s ease;line-height:2.2}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.beat-location{font-size:.65rem;letter-spacing:5px;color:var(--accent);margin-bottom:10px;font-family:var(--serif)}
.beat-text{font-family:var(--serif);font-size:.92rem;color:#bbb;line-height:2.3;text-align:justify}
.beat-text p{margin-bottom:14px}
.scene-insert{background:#0a0a0a;border-left:3px solid var(--accent);padding:18px 20px;margin:16px 0;font-family:var(--serif);line-height:2.2;font-size:.85rem;color:#999}
.scene-insert .tag{display:inline-block;background:var(--accent);color:#fff;padding:3px 10px;font-size:.6rem;letter-spacing:3px;margin-bottom:10px}

/* Choices */
.choice-list{display:grid;gap:9px;margin:20px 0}
.choice-btn{padding:15px 18px;border:1px solid var(--border);background:#0d0d0d;color:#bbb;cursor:pointer;font-size:.9rem;text-align:left;font-family:var(--serif);letter-spacing:.5px;transition:all .25s;display:flex;align-items:flex-start;gap:12px;line-height:1.6}
.choice-btn:hover{border-color:var(--gold);background:#151515}
.choice-btn .dot{flex-shrink:0;width:8px;height:8px;border-radius:50%;background:var(--border);margin-top:7px;transition:all .2s}
.choice-btn:hover .dot{background:var(--gold)}

/* Clue notebook */
.notebook{background:#0a0a0a;border:1px solid #1a1a33;padding:16px 18px;margin:14px 0;animation:fadeIn .35s ease}
.notebook-title{font-size:.65rem;letter-spacing:4px;color:var(--blue);margin-bottom:6px;font-family:var(--serif)}
.notebook .entry{font-size:.85rem;color:#aaa;line-height:1.9;padding:4px 0;border-bottom:1px dotted #1a1a1a}
.notebook .entry:last-child{border-bottom:none}

/* Accusation */
.suspect-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin:16px 0}
.suspect-card{padding:20px 14px;border:1px solid var(--border);background:#0d0d0d;cursor:pointer;text-align:center;transition:all .25s}
.suspect-card:hover{border-color:var(--accent);background:#1a0a0a;transform:translateY(-2px)}
.suspect-card .s-avatar{font-size:2.2rem;margin-bottom:8px}
.suspect-card .s-name{color:var(--paper);font-size:.95rem;margin-bottom:2px}
.suspect-card .s-role{font-size:.7rem;color:var(--muted)}

/* Result */
.result-panel{text-align:center;padding:32px 24px;background:var(--card);border:1px solid var(--border);margin-bottom:14px;animation:fadeIn .5s ease}
.result-rating{font-size:5rem;font-weight:900;font-family:var(--serif);margin:12px 0;line-height:1}
.result-rating.S{color:#f5c518;text-shadow:0 0 40px rgba(245,197,24,.5)}
.result-rating.A{color:var(--green);text-shadow:0 0 25px rgba(58,125,68,.4)}
.result-rating.B{color:var(--blue)}
.result-rating.C{color:var(--muted)}
.result-msg{font-size:1.1rem;color:var(--paper);font-family:var(--serif);letter-spacing:3px;margin-bottom:12px}
.result-detail{font-size:.82rem;color:var(--muted);line-height:2;margin-bottom:16px}
.truth-box{font-family:var(--serif);color:#bbb;line-height:2.2;font-size:.88rem;text-align:left;background:#0a0a0a;padding:20px;margin:14px 0;border:1px solid var(--border);border-left:3px solid var(--gold)}
.truth-box b{color:var(--gold)}

/* Buttons */
.btn{padding:11px 24px;border:1px solid var(--border);cursor:pointer;font-size:.82rem;font-family:var(--serif);letter-spacing:2px;background:transparent;color:var(--muted);transition:all .25s;display:inline-block}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-go{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-go:hover{background:#b01d38;color:#fff}
.btn-continue{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.btn-continue:hover{background:#d4a00a;color:#000}

/* Toast / Confetti */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--gold);color:var(--gold);padding:12px 28px;font-family:var(--serif);letter-spacing:2px;font-size:.8rem;z-index:999;animation:toastIn .3s ease,toastOut .3s ease 1.8s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-24px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.confetti{position:fixed;pointer-events:none;z-index:999;font-size:2rem;animation:drop 2s ease forwards}
@keyframes drop{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

@media(max-width:500px){.case-grid{grid-template-columns:1fr}.suspect-grid{grid-template-columns:1fr 1fr}.beat-panel{padding:16px 14px}.beat-text{font-size:.82rem;text-align:left}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <div class="char-card">
    <div class="char-avatar">🕵️</div>
    <div class="char-name" id="charName">侦探</div>
    <div class="char-title" id="charTitle">见习探员</div>
    <div class="char-stats"><span>⭐ <b id="homeScore">0</b> 分</span><span>📋 <b id="homeSolved">0</b>/6 已破</span><span>🏆 <b id="homeBest">-</b></span></div>
  </div>
  <div class="case-grid" id="caseGrid"></div>
</div>

<!-- CASE -->
<div class="screen" id="caseScreen">
  <div class="case-header">
    <div><div class="title" id="caseName"></div></div>
    <div class="progress-bar" id="progressBar"></div>
    <button class="btn-leave" onclick="abandonCase()">放弃</button>
  </div>
  <div id="caseContent"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const P={score:0,solved:{},currentCase:null,currentBeat:0,visitedBeats:[],notebook:[],wrongAccusations:0,finished:false};
const RANKS=[{min:0,title:'见习探员',icon:'🔍'},{min:120,title:'初级探员',icon:'📋'},{min:300,title:'中级探员',icon:'🔎'},{min:550,title:'高级探员',icon:'🎩'},{min:900,title:'资深探员',icon:'🏅'},{min:1400,title:'首席神探',icon:'👑'},{min:2000,title:'传奇侦探',icon:'🌟'}];
function rank(){for(let i=RANKS.length-1;i>=0;i--)if(P.score>=RANKS[i].min)return RANKS[i];return RANKS[0]}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function refreshHome(){const r=rank();document.getElementById('charName').textContent=r.icon+' 侦探';document.getElementById('charTitle').textContent=r.title;document.getElementById('homeScore').textContent=P.score;const c=Object.keys(P.solved).length;document.getElementById('homeSolved').textContent=c;document.getElementById('homeBest').textContent=c>0?Object.values(P.solved).sort()[0]+'级':'-';renderGrid()}
function renderGrid(){document.getElementById('caseGrid').innerHTML=CASES.map(ca=>{const s=P.solved[ca.id],a=P.currentCase===ca.id,l=P.currentCase!==null&&P.currentCase!==ca.id;let cl='case-item';if(s)cl+=' solved';if(a)cl+=' current';if(l)cl+=' locked';return`<div class="${cl}" onclick="startCase('${ca.id}')"><div class="case-icon">${ca.icon}</div><div class="case-title">${ca.title}</div><div class="case-meta">${ca.tagline}</div>${s?`<div style="font-size:.65rem;color:var(--gold);margin-top:4px">已破·评级 ${s}</div>`:''}${a?`<div style="font-size:.65rem;color:var(--accent);margin-top:4px">进行中…</div>`:''}</div>`}).join('')}

// ═══════════════════════════════════════════════════
// CASE ENGINE
// ═══════════════════════════════════════════════════
function startCase(id){
  if(P.currentCase&&P.currentCase!==id){toast('请先完成当前案件');return}
  if(P.solved[id]){toast('此案已侦破');return}
  P.currentCase=id;P.currentBeat=0;P.visitedBeats=[];P.notebook=[];P.wrongAccusations=0;P.finished=false;
  showScreen('caseScreen');goToBeat(0);refreshHome();
}
function abandonCase(){
  if(!confirm('放弃此案将永久锁定，无法重开。确定？'))return;
  P.currentCase=null;showScreen('homeScreen');refreshHome();toast('案件已放弃。');
}
function goToBeat(idx){
  const ca=CASES.find(x=>x.id===P.currentCase);if(!ca)return;
  P.currentBeat=idx;if(!P.visitedBeats.includes(idx))P.visitedBeats.push(idx);
  const beat=ca.beats[idx];
  // Progress bar
  const total=ca.beats.length;
  document.getElementById('progressBar').innerHTML=Array.from({length:total},(_,i)=>{let cl='progress-dot';if(P.visitedBeats.includes(i))cl+=' visited';if(i===idx)cl+=' current';return`<span class="${cl}"></span>`}).join('');
  document.getElementById('caseName').textContent=ca.icon+' '+ca.title;
  // Render beat
  let h=`<div class="beat-panel"><div class="beat-location">${beat.location||''}</div><div class="beat-text">${beat.text}</div>`;
  if(beat.scene)h+=`<div class="scene-insert"><span class="tag">现场</span>${beat.scene}</div>`;
  // Notebook
  if(P.notebook.length>0){h+=`<div class="notebook"><div class="notebook-title">📓 调查笔记</div>${P.notebook.map(e=>`<div class="entry">${e}</div>`).join('')}</div>`}
  // Choices or Continue
  if(beat.choices&&!P.finished){
    h+=`<div class="choice-list">`;
    beat.choices.forEach((ch,i)=>{h+=`<button class="choice-btn" onclick="makeChoice(${idx},${i})"><span class="dot"></span><span>${ch.label}</span></button>`});
    h+=`</div>`;
  }else if(beat.type==='accusation'&&!P.finished){
    h+=`<div style="margin:16px 0;font-family:var(--serif);color:var(--gold);text-align:center;letter-spacing:2px">⚖️ 请指认真凶</div><div class="suspect-grid">`;
    ca.suspects.forEach((s,i)=>{h+=`<div class="suspect-card" onclick="accuse(${i})"><div class="s-avatar">${s.avatar}</div><div class="s-name">${s.name}</div><div class="s-role">${s.role}</div></div>`});
    h+=`</div>`;
  }else if(!P.finished){
    h+=`<div style="margin-top:20px"><button class="btn btn-go" onclick="continueBeat()">继续 →</button></div>`;
  }
  h+=`</div>`;document.getElementById('caseContent').innerHTML=h;
}
function makeChoice(bIdx,cIdx){
  const ca=CASES.find(x=>x.id===P.currentCase),beat=ca.beats[bIdx],ch=beat.choices[cIdx];
  if(ch.note&&!P.notebook.includes(ch.note))P.notebook.push(ch.note);
  if(ch.effect==='wrong')P.wrongAccusations++;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  setTimeout(()=>goToBeat(ch.next),50);
}
function continueBeat(){const ca=CASES.find(x=>x.id===P.currentCase),beat=ca.beats[P.currentBeat];if(beat.defaultNext!==undefined){document.querySelectorAll('.btn-go').forEach(b=>b.disabled=true);setTimeout(()=>goToBeat(beat.defaultNext),40)}}
function accuse(si){
  const ca=CASES.find(x=>x.id===P.currentCase);
  if(si===ca.culprit){
    P.finished=true;
    let r='C';const rn=P.notebook.length,tbn=ca.totalNotes||rn+3;
    if(P.wrongAccusations===0&&rn>=tbn-1)r='S';else if(P.wrongAccusations===0&&rn>=tbn-3)r='A';else if(P.wrongAccusations<=1)r='B';
    P.solved[ca.id]=r;const scores={S:200,A:140,B:70,C:30};P.score+=scores[r];
    const msgs={S:'完美推理！每一个细节都被串联成了完整的证据链。',A:'出色的侦破！核心推理路径完全正确。',B:'基本过关。虽然遗漏了一些线索，但真凶已被锁定。',C:'勉强过关。下一次需要更加仔细。'};
    const em={S:'🎩✨🏆',A:'🎉⭐',B:'👍',C:'😐'};
    document.getElementById('caseContent').innerHTML=`
      <div class="result-panel"><div>案件终结 — ${ca.icon} ${ca.title}</div><div class="result-rating ${r}">${r}</div><div class="result-msg">${msgs[r]}</div><div class="result-detail">${em[r]} 获得 <b style="color:var(--gold)">+${scores[r]}</b> 分</div><div class="truth-box"><b>【真相揭示】</b><br><br>${ca.truth}</div><button class="btn btn-continue" onclick="returnHome()">返回事务所 →</button></div>`;
    document.getElementById('progressBar').innerHTML='';
    if(r==='S'||r==='A')spawnConfetti();
    P.currentCase=null;refreshHome();
  }else{P.wrongAccusations++;toast('❌ 不对。重新思考。')}
}
function returnHome(){showScreen('homeScreen');refreshHome()}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2100)}
function spawnConfetti(){const e=['🎉','✨','🏆','🎩','💎','⭐','🔥','👑'];for(let i=0;i<24;i++)setTimeout(()=>{const d=document.createElement('div');d.className='confetti';d.textContent=e[Math.floor(Math.random()*e.length)];d.style.left=Math.random()*100+'%';d.style.animationDuration=(1.5+Math.random()*1.8)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),3500)},i*70)}

// ═══════════════════════════════════════════════════
// CASES
// ═══════════════════════════════════════════════════
const CASES=[];

// ── 案件1：倾斜之馆（完整互动小说版）──────
CASES.push({
id:'slanted',icon:'🏚️',title:'倾斜之馆',tagline:'15度倾斜·弹珠密室·建筑诡计',
totalNotes:8,
beats:[
{location:'十二月十七日·凌晨04:17·贡嘎山麓',text:`
<p>电话响了四下你才接。是省厅调度中心。"贡嘎山——倾斜馆——命案。暴风雪封了路，直升机一个小时后到。你先准备一下。"</p>
<p>你想起了那栋房子。四年前你还在基层时，曾处理过一起与倾斜馆有关的民事纠纷——邻居投诉那栋"歪房子"破坏了山景。当时你爬到半山腰，在晨雾中看到了那栋建筑：它像喝醉了一样向南倾斜了十五度，仿佛下一秒就要栽进山谷里。你记得自己当时的想法——<b>住在里面的人，每天醒来看到一个倾斜的世界，会是什么感觉？</b></p>
<p>一个小时后，你在直升机螺旋桨的轰鸣中降落在倾斜馆门前的雪地上。暴风雪已经停了。夜空晴朗，猎户座悬在倾斜的屋顶上方。一个穿警服的当地民警跑过来递给你一份简报："死者谭正声，六十八岁，退休玩具设计师。妻子谭小曼报的案——她说早上发现丈夫死在卧室里，门是反锁的。"</p>
<p>你抬头望向这栋倾斜的三层建筑。二楼的灯还亮着——谭小曼在那里等着。你知道这将是一个漫长而倾斜的夜晚。你走向那扇歪着的门。</p>
`,defaultNext:1},
{location:'凌晨04:45·倾斜馆一楼客厅',text:`
<p>屋内的倾斜比外观更让人不适。你踏入客厅，立刻感到身体不自觉地向右倾斜——不对，是地板在向左倾斜。你的内耳和双眼在争吵。你不得不扶住墙面来稳住身体。</p>
<p>谭小曼坐在沙发上，裹着一条灰色的羊绒毯。她四十岁左右，脸部的线条锐利而克制。你注意到她的坐姿——即使在倾斜十五度的客厅里，她不需要任何支撑，身体自然而稳定，像是长在这倾斜面上的植物。</p>
<p>"我在倾斜馆住了十五年。"她仿佛读出了你的想法。"十五年。我已经不记得水平面是什么感觉了。"</p>
<p>你问她关于今晚的事。她说她和丈夫在一楼吃了晚饭——他做了红烧排骨——然后在二楼各自回房。"他每晚都会在睡前到三楼'倾斜之间'待一会儿——那是他的工作室。他在那里设计玩具。"她说昨晚丈夫大约九点上楼，她十点入睡。"什么都听不到。直到早上六点我醒来——他的床上没有人——我上楼——门锁着——我撞开了门——"她的叙述突然断了。"然后我看到他躺在地上。到处都是弹珠。"</p>
<p>你注意到她的用词。"<b>弹珠</b>？"</p>
<p>"玻璃弹珠。他收藏了几百颗。本该在一楼仓库的。但它们全部在三楼——在他的尸体周围。"</p>
`,defaultNext:2},
{location:'凌晨05:10·"倾斜之间"',text:`
<p>你沿着螺旋楼梯走上三楼。"倾斜之间"的门已经被撞开，歪斜地挂在铰链上。你站在门口，让手电筒的光束扫过房间——</p>
<p>六十八岁的谭正声仰面躺在房间的南侧。他的胸口正中插着一把工艺刀——刀柄是深色木质的，刀身窄而锋利。刀插得很深，以至于只露出刀柄的三分之一。血已经干了，在倾斜的地板上形成了一道暗色的细流——血液沿着15度的倾角从尸体流向更低的南墙。</p>
<p>然后你看到了弹珠。</p>
<p><b>三百多颗玻璃弹珠</b>——翠绿的、琥珀的、深蓝的——散落在房间的南半侧。它们不是均匀分布的：从北向南形成了一个扩散的扇形，像是从一个点涌出的波浪。北半侧的高处几乎没有弹珠。每颗弹珠都在手电筒下闪着冷光。</p>
<p>你小心翼翼地在弹珠之间踩出空隙。你的脚在倾斜面上打滑——弹珠让十五度的斜面变得更像一个陷阱。</p>
<p>你抵达了北墙——然后看到了墙上的圆孔。直径约两厘米，边缘干净利落，像是用钻头打出来的。</p>
`,defaultNext:3},
{location:'凌晨05:30·勘察现场',text:`
<p>你跪在北墙边（这个姿势在倾斜面上极不舒服），用手电筒照射那个小孔。孔的内壁光滑，但有轻微的摩擦痕——是绳子一类的纤维材料反复摩擦留下的痕迹。你将手电筒的光柱对准孔洞——光线穿透过去，照进了阁楼的通风管道。两个孔洞在一条直线。</p>
<p>你叫来警员帮你测量每一项数据。弹珠数量：三百二十七颗。弹珠类型：1970年代日本制造的绝版玻璃弹珠——死者谭正声收藏了四十年。弹珠原本的位置：一楼仓库，密码锁陈列柜。</p>
<p>一名警员在尸体的睡衣口袋中找到了房门的钥匙——锁孔还能正常转动。法医初步判断：死亡时间在凌晨2:00至3:00之间。致命伤为工艺刀刺穿心脏。伤口角度显示凶手是<b>正面行刺</b>，略微从右上向左下倾斜——这符合两人站立时面对面攻击的角度。</p>
<p>你没有太多时间。暴风雪虽然停了，但新的证据随时可能因温度变化而损坏。你需要决定从哪里开始深入调查。</p>
`,choices:[
{label:'重点分析弹珠的分布模式——为什么弹珠只在南半侧？',note:'弹珠分布呈北→南扇形扩散，起点指向北墙小孔正下方。物理模拟表明弹珠是从固定容器中一次释放，而非人为撒开。',next:4},
{label:'重点调查北墙小孔和阁楼通风管的关联',note:'小孔与阁楼通风管对齐。在阁楼中发现跪姿压痕和一截烧焦的棉绳——与捆绑弹珠木箱的绳子材质一致。',next:5},
{label:'重点调查仓库密码锁——弹珠是如何被取出的？',note:'弹珠陈列柜有密码锁。家政工沈青曾试图用偷配的钥匙打开但密码错误。只有知道密码的人才能取出弹珠——谭小曼知道（结婚纪念日）。',next:6},
]},
// Branch A: 弹珠分布
{location:'弹珠分布分析',text:`
<p>你让警员拍照记录下每一颗弹珠在房间中的精确位置。回到警局的物理实验室后，你请一位物理学家模拟了"在一个15度斜面上释放三百二十七颗弹珠"的过程。</p>
<p>结果令人震惊：模拟弹珠与现场照片的分布匹配度达到<b>94%</b>。条件是——弹珠必须被装载在一个大约40cm×30cm×20cm的容器中，容器被固定在北墙根处（斜面高处），容器的开口朝向南方（斜面低处）。当容器被"打开"时——弹珠因重力同时涌出，在15度的倾斜面上自然滚动，形成了从北向南的扇形分布。</p>
<p><b>弹珠不是被人撒开的。弹珠是从一个容器中被"释放"的。</b></p>
<p>这引出了下一个问题——谁打开了容器？如何打开？打开容器的人当时是否在房间里？如果不在——那这是远程操作的。北墙的小孔和阁楼的通风管开始在你脑海中串联起来。</p>
`,scene:'物理模拟结果：容器40×30×20cm，开口朝南，倾斜15度。释放瞬间所有弹珠同时涌出，0.8秒内覆盖南半侧地板。与现场照片对比匹配度94%。',defaultNext:7},
// Branch B: 阁楼
{location:'阁楼·通风管',text:`
<p>你爬上阁楼——这是一个低矮闷热的三角形空间，被灰尘和蛛网统治。你沿着通风管道的走向，趴在满是灰尘的木板上，像一只在阁楼里狩猎的猫。手电筒照亮了灰尘表面——</p>
<p>一个清晰的<b>跪姿压痕</b>出现在通风管开口的正前方。有人在这里跪了不短的时间——压痕很深，膝盖和脚尖的位置清晰可辨。你小心翼翼地靠近压痕旁的地板上——一小截<b>烧焦的棉绳</b>嵌在木板缝隙中。约5厘米长，一端烧得焦黑卷曲。</p>
<p>棉绳。烧焦。阁楼。通风管。北墙小孔。你把这些元素放入脑中——一幅画面逐渐成形：一个人跪在这里，手中拉着一根穿过通风管和墙壁小孔的棉绳。当绳子被拉紧时——小孔的另一端有什么东西被释放了。三百二十七颗弹珠在15度倾斜面上开始滚动。</p>
<p>你叫来现场的勘查员。"把这个压痕和棉绳拍照、采样。查一下棉绳的产地和用途。"后来你知道——棉绳是用于捆绑玩具包装盒的专用绳，与一楼仓库木箱上的残余绳头完全相同。</p>
`,scene:'阁楼灰尘上的跪姿压痕：膝盖间距约35cm（推测女性）。棉绳末端烧焦——推测用打火机烧断。压痕旁地板上有两处手掌撑痕。',defaultNext:7},
// Branch C: 密码锁
{location:'一楼仓库·弹珠陈列柜',text:`
<p>你下到一楼仓库。弹珠陈列柜是一个老式的木框玻璃柜——手工制作，嵌在仓库墙壁上的凹槽内。柜门是密码锁——四个转轮，老式机械结构，不需要电源。</p>
<p>技术员采集了密码锁表面的指纹。结果有三组：谭正声（主人）、谭小曼（妻子）、沈青（家政工）。沈青——为什么她的指纹会出现在弹珠柜的密码锁上？她说自己"从来不碰谭先生的收藏"。</p>
<p>更诡异的是——密码锁的转轮上有<b>三组错误的密码尝试记录</b>（锁芯中的弹子有错误的拨动痕迹）。三组错误密码之后，第四组输入是正确的。如果沈青在偷弹珠（她需要钱），她不知道密码——所以她试了三次，都错了，然后跑了（她听到警报或有其他动静）。之后——有人输入了正确的密码，打开了柜子，取出了弹珠。</p>
<p>谁知道正确密码？结婚纪念日——0621。谭小曼知道。谭正声自己当然也知道。六月初夏——你想起谭小曼描述丈夫"做了红烧排骨"——他在纪念日前做了一顿好饭吗？</p>
`,scene:'密码锁转轮上的三组错误尝试（沈青）→第四组正确（0621=结婚纪念日）→弹珠柜打开。沈青的三个错误密码是随机数字——她不知道密码。',defaultNext:7},
// Junction beat
{location:'上午09:30·线索汇总',text:`
<p>你回到一楼的临时指挥中心。桌上摊开了你目前收集到的关键信息：</p>
<p>① 弹珠被从北墙处的容器中远程释放——分布在15度倾斜面上形成扇形。</p>
<p>② 北墙小孔与阁楼通风管对齐——阁楼有跪姿压痕和烧焦棉绳。</p>
<p>③ 弹珠柜密码锁有三组错误尝试（沈青）和一组正确输入（知道密码的人）。</p>
<p>④ 密室——门反锁，钥匙在死者口袋。窗户无法出入。</p>
<p>⑤ 死亡时间：凌晨2:00-3:00。正面刺杀。工艺刀——死者自己的工具。</p>
<p>三条线索都在指向同一个方向——一个知道密码、能在倾斜面上自如行动、知道阁楼通风管走向的人。在三个嫌疑人中，只有一个人同时符合这三个条件。</p>
<p>但现在下结论还太早。你需要听他们自己怎么说。三名嫌疑人已经在不同的房间里等着你了。你决定先传唤谁？</p>
`,choices:[
{label:'先询问妻子谭小曼——她声称"撞门进入"发现尸体',note:'谭小曼在倾斜馆十五年——身体适应15度斜面。知道仓库密码（结婚纪念日）。知道阁楼通风管构造。声称"整晚在二楼睡觉，什么都没听到"。撞门行为破坏了密室的第一现场。',next:8},
{label:'先询问前合伙人陆鸣——案发夜被目击在山路上逗留',note:'陆鸣二十年前被死者骗走所有专利。案发夜共享汽车GPS显示他在距倾斜馆300米处停车20分钟。他看到二楼灯光在凌晨2:15亮着——谭小曼声称在睡觉。',next:9},
{label:'先询问家政工沈青——她的指纹出现在弹珠柜密码锁上',note:'沈青因母亲重病急需用钱，偷配了仓库钥匙想偷弹珠卖钱。但密码锁三次错误触发警报，她逃跑。她的行为解释了密码锁上的指纹——但她不知道密码，打不开柜子。',next:10},
]},
// Tan Xiaoman interrogation
{location:'审讯室A·谭小曼',text:`
<p>谭小曼坐在你对面时，姿态和几个小时前在客厅时一模一样——稳定、安静、在倾斜面上不动如山。你不禁想起她说过的那句话：<i>"我已经不记得水平面是什么感觉了。"</i></p>
<p>"谭女士，"你开口，"你说你整晚在二楼睡觉。二楼就在"倾斜之间"的正下方。三百二十七颗弹珠同时从容器中涌出，在木质地板上滚动——声音足以传遍整栋楼。"</p>
<p>她的眼睛没有闪躲。"我睡觉很深。十五年——这栋房子的每一声木头热胀冷缩、每一次风吹过通风管的啸叫——我都已经听不到了。"</p>
<p>"你丈夫昨晚和你一起吃了晚饭。他做了红烧排骨。那天是六月二十一日——你们的结婚纪念日。他为你做了一顿好饭，然后用结婚纪念日做密码打开弹珠柜——他是自己拿出了弹珠吗？"</p>
<p>谭小曼的手指微微收紧。"我不知道。我没有去仓库。"</p>
<p>"你知道密码。"</p>
<p>"我当然知道。那是我和他的结婚纪念日。但知道密码不等于我去过仓库。"</p>
<p>你站起来，走到她身边。在倾斜面上，你的身体不自觉地向右倾——但你看到谭小曼的身体纹丝不动。"你知道阁楼的通风管通向'倾斜之间'的北墙。你知道从阁楼可以拉一根绳子穿过通风管。你知道——"</p>
<p>"我知道很多东西。"她打断你。"我在这里住了十五年。我了解这栋房子的每一个角落。但这不代表我杀了我的丈夫。"</p>
<p>她直视着你。十五年的倾斜生活让她拥有一双异常稳定的眼睛。</p>
`,scene:'谭小曼的坐在椅子上的姿态——完全垂直。不是垂直于地面，是垂直于15度的倾斜面。她的身体已经重新定义了"垂直"。',defaultNext:11},
// Lu Ming interrogation
{location:'审讯室B·陆鸣',text:`
<p>陆鸣的眼中布满血丝。这个四十五岁的男人看上去像六十岁——二十年的贫困和怨恨在他的脸上刻下了深痕。</p>
<p>"二十年前，"你还没问他就开始讲了，"我和谭正声睡在同一个车间里——没有暖气，零下十几度，我们盖着同一床被子。我们用同一把工具刀雕玩具。那时候他说——'我们的公司将来会成为中国最大的玩具公司'。"他笑了一声。"后来他找了一个律师，用一份我一个字都没看懂的合同，把我所有的股份转到了他自己名下。所有的。我一分钱没有拿到。"</p>
<p>"案发当晚你开车到了倾斜馆附近。"</p>
<p>"我停了车。在弯道那里。我看到了二楼的一扇窗亮着灯——谭小曼的影子在窗前走动。那时是凌晨2:15——因为我看了一眼车上的钟。"</p>
<p>你意识到——这个信息很重要。谭小曼说她在睡觉。凌晨2:15，死亡推定时间窗口内——她在二楼走动。</p>
<p>"为什么不进去？"</p>
<p>陆鸣沉默了很长时间。"因为我想起了一件事。二十年前我最后一次离开这个车间时——谭正声站在门口，手里拿着我们合做的那把工具刀。他说：'你走吧。这把刀以后就只属于我了。'二十年过去了——他被同一把刀杀死了。我觉得——这是报应。但不是我的报应。"</p>
`,scene:'陆鸣提供的证词：凌晨2:15看到二楼灯光——谭小曼的身影在窗前走动。这与谭小曼"整晚睡觉"的证词直接矛盾。',defaultNext:11},
// Shen Qing interrogation
{location:'审讯室C·沈青',text:`
<p>沈青的手指在桌面上不停地绞动。才三十二岁，但她的手上有洗不掉的油污——弹珠润滑油。</p>
<p>"我是去偷弹珠的。"她直截了当地承认了，声音颤抖，但话语干净利落。"三个月前谭先生开始对我——他每次我打扫的时候都站在我旁边。他的手——总是'不小心'碰到我。上个月他说这些弹珠值八十万。他说——'如果你需要钱，也许我们可以做个朋友'。我明白他的意思。我拒绝了。但一周后我妈住院了。手术费——我拿不出来。我想——偷几颗弹珠卖掉不会有人发现。"</p>
<p>"你那天下午趁他午睡进了仓库。密码锁——你试了三次——然后警报响了——你跑了。"</p>
<p>她点头。"警报的声音很大。我以为全楼都听到了。但没有人来。我想——也许谭先生午睡还没醒。"她抬起头。"你相信我吗？"</p>
<p>你相信她那部分。但三组错误密码之后——有人输入了0621。谭正声在午睡。警报响了——他不应该醒着。谁在警报响之后输入了正确密码？</p>
<p>沈青看着你，仿佛在等待判决。你知道她的小偷行为与谋杀无关——但她的行为提供了一条关键的时间线：警报在下午触发 → 之后正主输了正确密码 → 弹珠被取出。下午输入密码的人，就是取出弹珠的人。</p>
`,scene:'密码锁内部的痕迹记录：三组错误密码→警报触发→然后正确密码0621输入。输入间隔约15分钟——沈青逃跑后约15分钟。',defaultNext:11},
// Junction: 整合阶段
{location:'下午14:00·专案分析',text:`
<p>三名嫌犯的审讯都结束了。你坐在临时指挥中心里，将所有信息铺在白板上。</p>
<p><b>谭小曼：</b>凌晨2:15被陆鸣目击在二楼活动——与她自称"整晚睡觉"矛盾。她知道密码，知道阁楼构造，能适应倾斜面。但她没有杀人动机——除非丈夫的那顿"纪念日晚餐"背后隐藏着什么。</p>
<p><b>陆鸣：</b>凌晨2:15在山路上目击到二楼灯光，但他自己也被GPS记录在案——在弯道上停了20分钟。他说是"到了门口又放弃了"，但20分钟——足够走到倾斜馆再回到车上。</p>
<p><b>沈青：</b>偷弹珠的行为解释了密码锁上的指纹，但她没有杀人动机——她只是需要钱给母亲治病。而且她知道密码错三次就会触发警报——不可能继续输入。</p>
<p>然后你收到了一条来自物证科的新消息：<b>"阁楼棉绳上的烧焦痕迹——是用谭正声书房里的打火机烧的。打火机上有谭小曼的指纹。"</b></p>
<p>所有箭头都开始指向同一个人。但你需要最后确认一件事——密室的构造。弹珠是如何被从阁楼远程释放的？</p>
`,choices:[
{label:'重建密室：凶手将弹珠装入木箱→固定于北墙→箱盖由穿小孔的绳子控制→从阁楼拉绳释放弹珠',note:'密室全貌：木箱固定于北墙高处，箱口朝南。箱盖被一根棉绳拉住——绳子穿过北墙小孔→通风管→延伸到阁楼。凶手锁门→上阁楼→拉绳→绳从小孔滑出→箱盖弹开→弹珠倾泻→覆盖痕迹→密室完成。',next:12},
{label:'考虑另一种可能性：弹珠是凶手在室内撒开的，不是远程释放',note:null,effect:'wrong',next:12},
]},
{location:'下午17:00·真相成形',text:`

<p>一周之内，洛阳、秦岭、成都、大理、广州——五座城市分别发现了同一个人的不同身体部位。每个现场都留有星座标记——白羊座头颅（漠河）、金牛座脖颈（洛阳）、双子座双臂（秦岭）、巨蟹座躯干（成都）、狮子座心脏（大理）、处女座双腿（广州）。全国六处——对应北斗七星的六颗星。还剩最后一颗星——破军，主杀伐。还剩最后一个部位没有出现。</p>
<p>你站在漠河的雪原上，看着那颗头颅被法医小心地装入证物袋。一个念头在你脑海中形成：<b>这六处抛尸地不是随机的。它们精确对应了北斗七星的星位。凶手在按照星图杀人。</b></p>
`,defaultNext:1},
{location:'十二月十日·公安部专案组',text:`
<p>六座城市的物证在你的办公桌上汇聚成一座小山。你用了三天时间把六个现场的照片全部铺在墙上——从漠河到广州，跨越三千公里的死亡地图。</p>
<p>关键发现：①六个抛尸点的经纬度——当你把它们标注在天文星图上时——与北斗七星在十一月二十日（受害者失踪日）午夜的天球投影精确吻合。误差不超过0.3公里。凶手具备专业级的天文计算能力。②双套结的打法——六个塑料袋中有四个使用了同样的双套结。这种结在民用领域几乎不存在——它是海军舰艇系泊的标准绳结。③第三个现场（秦岭·双子座双臂）的雪地上留下了一个<B>鞋印</b>——44码，男式登山靴，鞋底纹路是日本品牌Mont-Bell的限量款。全国只有六家店在卖这款靴子。</p>
<p>三天的排查锁定了三名嫌疑人。你需要决定深挖哪一个方向。</p>
`,choices:[

// Branch A: 段星河
{location:'段星河·审讯室A',text:`
<p>段星河走进审讯室时，你注意到的第一件事是他的步伐——精确、对称、每一步之间的距离像是用尺子量过。五十三岁的男人，灰白头发理得极短，露出头骨的轮廓。他的眼睛是一种浅褐色——在审讯室的荧光灯下几乎呈现金色。</p>
<p>"你知道我们会来找你。"你说。</p>
<p>"我知道。"他的声音平静得不像一个被指控连环杀人的人。"从我发表'人体-天体对应假说'的那一天起——我就知道早晚会有警察来找我。只不过我以为是学术界先报警——说我疯了。"他微微一笑。"结果他们直接把我踢出去了，连报警都省了。"</p>
<p>你把六名受害者的星盘分析图推到他面前。他的表情没有任何变化。"这些是你写的。"</p>
<p>"是我写的。我为三百多人做过星盘分析——这是我的研究。研究不犯法。"</p>
<p>"你的研究包括给每个人的'匹配度'打分？"你指向图上的百分比数字。林小鹿的匹配度是<b>97.3%</b>——六人中最高。</p>
<p>段星河沉默了三秒钟——在审讯中，三秒钟的沉默足够装满一个海洋。"匹配度越高——代表这个人的星盘与北斗七星的星位共振越强。林小鹿几乎完美。她的出生时间——1989年3月21日02:17——春分点，太阳进入白羊座的精确时刻。她的上升星座是双子——月亮在处女——火星在白羊。北斗七星中六颗星的星位在她的出生星盘上全部有对应。只差一颗——破军。"</p>
<p>你将他的笔记本从证物袋中取出。翻到被撕去一页的位置——那一页被撕得很干净，但下一页的压痕在侧光下清晰可见。你把压痕复原图推到他面前。</p>
`,scene:'压痕复原图：一个由六个身体部位拼成的人形——白羊座头颅、金牛座脖颈、双子座双臂、巨蟹座躯干、狮子座心脏、处女座双腿。人形下方一行字："完全人=神。此三者皆我之器。"',defaultNext:5},
// Branch B: 苏晓星
{location:'苏晓星·星辰会总部',text:`
<p>星辰会的总部位于成都郊区一栋改建的厂房内。你推开门，首先看到的是一幅从天窗垂下的巨大深蓝色幕布——上面用金粉画着整个北天星空。阳光从幕布的缝隙中穿透进来，在地面上投下细碎的金色光斑。</p>
<p>苏晓星赤脚站在星图幕布下方。她三十七岁，但看上去更年轻——也许是那双眼睛的缘故。那双眼睛在谈论星星时会发出某种狂热的亮光，让你想起中世纪那些在火刑柱上也不改口的异端教徒。</p>
<p>"你想看地下室。"她先开口了。不是问句。</p>
<p>地下室的星图比她描述的更令人不安。直径六米的圆形星图占据了整个地面——北斗七星用银色荧光漆绘制，在紫外灯下发出幽绿色的光。你看到了血迹的位置——"火星"，星图中的一颗红色荧光星——位于白羊座方向。</p>
<p>"她来过。"苏晓星站在你身后说。她的声音在地下室的回音中显得有些遥远。"林小鹿。她来找我解梦。她说她连续七天梦到一颗红色的星星——越来越大——像是在朝她飞来。我说——那是火星。它代表战争。代表身体即将被分割。她说她害怕。我为她做了净化仪式。一个月后——她退出了教会。我以为她去了另一个城市。"</p>
<p>"你不知道她死了？"</p>
<p>"我知道。"她的声音低了下去。"我在新闻上看到的时候——正在喝咖啡。咖啡洒在了星图上。就是你现在看到的这个位置——火星。咖啡渍渗进了荧光漆。我洗不掉。后来我拿紫外灯照了一下——<b>咖啡渍的荧光反应和人血不同。</b>但我没有报警。因为我知道——说出'她来过'——我就会变成嫌疑人。"</p>
`,scene:'地下室的紫外灯检测：星图"火星"位置有两层痕迹——下层是咖啡渍（苏晓星所述），上层是人血（DNA匹配林小鹿）。有人在苏晓星的咖啡渍之上——后来——滴了血。',defaultNext:5},
// Branch C: 秦漠
{location:'秦漠·出租屋',text:`
<p>秦漠的出租屋在北京五环外一栋没有电梯的居民楼里。整个房间只有一盏台灯——其他灯泡全被他拆掉了。他说"头顶的光会影响思考"。你走进这个昏暗的空间，看到四面墙上贴满了照片、地图、星座图、打印出来的聊天记录——全部用红线连接，形成一张巨大的网。</p>
<p>在网的中心——是一个名字：<b>林小鹿</b>。</p>
<p>"我不是凶手。"秦漠坐在他的转椅上，手里转着一支没有墨水的钢笔。"我是一个记者。我在做一个关于'占星迷信与弱势女性'的调查报道。林小鹿是我的第一个采访对象。我在一个占星交友群里认识了她——用的是假身份，对，'命理师阿漠'。做卧底调查——这是基本操作。"</p>
<p>"你加入了苏晓星的星辰会？"</p>
<p>"当然。那个群就是苏晓星的人建的。我去过三次他们的'星象冥想会'——在地下室，所有人围着那个巨大的星图坐成一圈。苏晓星站在中间——像一个女祭司。她在每个人额头上用荧光漆画一颗星。然后熄灯——只有紫外灯亮着——所有人的额头都在发光。她说——'你们看，你们就是星星。'"</p>
<p>秦漠放下笔。"但群里还有一个更让我感兴趣的人。一个账号叫'观星者'——从来不参加线下活动，但在群里做非常专业的星盘分析。每个新入群的女性都会收到他的私信——'免费星盘分析'。我去查了他的IP——用的是代理，但有一次他忘了开——IP指向南京紫金山天文台的家属楼。段星河。被学界驱逐的天文学家。"</p>
`,scene:'秦漠的调查墙：红线连接着"苏晓星←→星辰会←→占星交友群←→段星河"。还有一条虚线——从段星河指向秦漠自己——标注"他也查过我？"',defaultNext:5},
// Junction: 三条线索汇聚
{location:'十二月十五日·专案组·线索墙',text:`
<p>三条线索在你的白板上汇聚。你站在六米长的线索墙前——左边是段星河的天文计算和压痕复原，中间是苏晓星地下室的血迹星图，右边是秦漠的调查网络和加密报告。</p>
<p>你拿起红笔，开始画线：</p>
<p>① 段星河的笔记本压痕"此三者皆我之器"——"器"是工具。苏晓星的场地是器。秦漠的人选库是器。段星河自己——是使用这些器的人。</p>
<p>② 段星河的海军服役记录——四年，二等兵，负责舰艇系泊。双套结是他的职业习惯。</p>
<p>③ 苏晓星地下室星图上的人血——在咖啡渍之上。苏晓星说的是真话——她确实不小心洒了咖啡。但后来有人——在她不知道的时候——把林小鹿的血滴在了星图上。这个人必须知道地下室的存在、知道星图上火星的位置、知道苏晓星的作息。</p>
<p>④ 秦漠的加密文件"完全人计划可行性报告"——最后一段写着："需要：天文坐标计算（段）、安全仪式场地（苏）、执行者（待定）。"秦漠不知道"执行者"是谁——他不知道段星河会亲自动手。</p>
<p>你把红笔放下。三个人的关系网已经清晰：<b>段星河——理论+执行。苏晓星——场地+仪式（不知情）。秦漠——情报+筛选（知道计划但不知道段会亲自动手）。</b></p>
<p>但谁是核心主谋——那个即使没有另外两人、也会找到其他方式实施犯罪的人？你需要分别审讯他们，从口供中找出真相。</p>
`,choices:[
{label:'先审段星河——他是一切理论的源头',note:'段星河是唯一同时具备天文知识、海军绳结技能、以及"完全人理论"动机的人。苏晓星和秦漠各自只掌握拼图的一部分——只有段星河能看到全貌。',next:6},
{label:'先审苏晓星——地下室的秘密还有更多',note:'苏晓星知道有人在她地下室滴了血但不知道是谁。她可能掌握着段星河和秦漠都忽略的时间线细节——比如谁有地下室的钥匙。',next:7},
{label:'先审秦漠——他的调查可能记录了他自己的罪行',note:'秦漠的调查笔记可以反过来读——他不是在调查犯罪，他是在记录自己参与犯罪的每一步。但他的报告中"执行者（待定）"四个字——说明他不知道段星河会亲自动手。他以为计划还停留在纸面上。',next:8},
]},
// 段星河审讯
{location:'段星河·深度审讯',text:`
<p>第二次审讯段星河时，你改变了策略。你不再给他展示证据——你把证据全部收起来，只放了一张纸在桌上：压痕复原图——六个人体部位拼成的完整人形。</p>
<p>他盯着那张纸看了很久。然后做了一件你没想到的事——<b>他笑了</b>。不是得意或嘲讽的笑——是某种苦涩的、一个终于被理解的人才会有的笑。</p>
<p>"你画得不对。"他说。伸手拿过一支铅笔——你没有阻止他——他在纸上添了几笔。在人形的头顶——他画了一颗星。在每一条肢体连接的关节处——他画了一颗星。六颗星，连接成一个完整的星图。</p>
<p>"北斗七星。"他说。"六颗星对应六个身体部位。第七颗星——破军——在头顶正上方。"他用笔尖点在北极星的位置。"这里——不在身上——在身体之外的星空中。破军不是身体的一部分。破军是<b>杀意</b>本身。"</p>
<p>"所以你承认了。"</p>
<p>"我在解释我的理论。十年前我想在《自然》杂志上发表这篇论文——<b>人类肢体的几何排列与北天星空主星的拓扑对应关系</b>。编辑回信说——'这不属于天文学范畴。'然后我的系主任把我的办公室清空了。我在海军四年攒下的全部积蓄——都用在了十年没有经费的研究上。"</p>
<p>"所以你需要证明你的理论。"你说。"不是用论文——是用实际行动。"</p>
<p>段星河把铅笔放下。他的手很稳。"如果你认为我有罪——那就证明它。用证据。不是用我的理论。"</p>
`,scene:'段星河亲笔补充的星图：六颗星连接六处关节——头颅（天枢）、脖颈（天璇）、双臂（天玑）、躯干（天权）、心脏（玉衡）、双腿（开阳）。第七颗星（破军）在头顶正上方——标注"杀意/意志/神"。',defaultNext:9},
// 苏晓星审讯
{location:'苏晓星·深度审讯',text:`
<p>你把苏晓星带到一间没有窗户的审讯室。没有星图。没有荧光漆。没有紫外灯。你把她和她赖以生存的星空符号彻底割裂。</p>
<p>她开始显得不安——手指在桌面上反复画着圆圈。</p>
<p>"地下室有几把钥匙？"</p>
<p>"两把。我自己一把——还有一把备用的，放在——"她突然停住了。</p>
<p>"放在哪里？"</p>
<p>"放在一楼的接待台抽屉里。但抽屉有锁——"</p>
<p>"谁有抽屉的钥匙？"</p>
<p>她的手指停止了画圈。"教会的财务——老周。但他两个月前辞职了。他说——'这份工作我干不了。'"她抬起头。"老周走之前——段星河来找过我。他说想做一次'地下室冥想'。我说地下室的钥匙在接待台——他可以去拿备用钥匙。他去了。他待了一个下午。"</p>
<p>"那天是什么时候？"</p>
<p>"十一月十九日。"</p>
<p>你翻开案卷。林小鹿失踪于十一月二十日。段星河进入苏晓星地下室——拿到备用钥匙——在星图上研究了火星的位置——然后<b>第二天</b>，林小鹿失踪了。</p>
`,scene:'时间线：11月19日段星河进入地下室→11月20日林小鹿失踪→11月20日-12月3日期间六次抛尸→12月3日漠河发现头颅。段星河在地下室待的那个下午——是犯罪开始前的最后24小时。',defaultNext:9},
// 秦漠审讯
{location:'秦漠·深度审讯',text:`
<p>秦漠坐在审讯室里，看上去比前两次更疲惫。他的手指关节因为长期敲键盘而有薄茧——你注意到他的食指一直在无意识地敲击桌面，像是在打字。</p>
<p>"你的'完全人计划可行性报告'——最后一段——'执行者（待定）'。"你把打印件推给他。"你什么时候写的这份报告？"</p>
<p>"十月。十月中旬。"</p>
<p>"你写报告的时候——知不知道段星河打算亲自动手？"</p>
<p>秦漠的食指停在了半空中。然后落下来——落在桌面上的"执行者"三个字上。"我不知道。我真的不知道。我以为——我以为这就是一个疯狂的写作素材。一个完美的犯罪故事。我是记者——我需要一个好故事。但写完之后——我对段星河说——'计划看起来可行，但需要执行者。'他说——'执行者已经有了。'"</p>
<p>"然后你做了什么？"</p>

<p>然后你收到了最后一个物证报告：在林小鹿的胃内容物中检出了安眠药成分——与段星河家中搜出的处方药完全一致。段星河以"失眠"为由开了两年的唑吡坦。他把药放进了林小鹿的饮料——在她签完"星盘分析知情同意书"之后。</p>

{location:'最终侦讯·段星河',text:`
<p>你最后一次把段星河带入审讯室。这一次——你没有给他纸和笔。你只给了他一样东西：林小鹿的照片。不是犯罪现场的照片——是她生前最后一张自拍。站在漠河的星空下，手指指向北斗七星。她的笑容很干净——不知道三天后自己会变成照片里的那个笑容。</p>
<p>段星河看着照片。看了很长时间。然后做了一件出乎你意料的事——他哭了。不是痛哭——是两行安静的眼泪，沿着他精确对称的脸颊滑下来。</p>
<p>"她的星盘——几乎完美。"他说。声音第一次出现了颤抖。"天枢在人马——天璇在双鱼——天玑在宝瓶——天权在天秤——玉衡在狮子——开阳在室女。六颗星——全部对应。我研究了三十年天文——从没见过这么完美的对应。如果我不做——就没有人能证明这个理论了。"</p>
<p>"你用六条人命来证明一个没人认可的天文理论。"你说。</p>
<p>"我用了六条人命。"他重复了一遍——然后加了一句你永远不会忘记的话："<b>但他们认可了。</b>你——公安部——全国人民——现在都在看我的星图。十年前没有人看。现在所有人都在看。"</p>
<p>审讯室里很安静。你听到走廊里有人走过的脚步声。窗外的北京在下雪——漠河的雪，终于跟到了这里。</p>

{location:'沈鹤鸣·被销毁的工作室',text:`
<p>沈鹤鸣的工作室在艺术馆的地下室——没有窗户，一盏日光灯发出嗡嗡的电流声。地板上铺满了撕碎的画纸、折断的画框、踩变形的颜料管。三十岁——应该是一个艺术家最有生命力的年纪——但他的眼睛看起来像一个已经不再期待明天的人。</p>

{location:'审讯·林远',text:`

{location:'苏建国家中',text:`
<p>苏建国的家是一栋铁路职工家属楼——建于八十年代，楼道里还贴着褪色的铁路安全宣传画。他开门时手里夹着一根烟——一种廉价的老牌香烟——烟灰落在他洗得发白的蓝色工装上。</p>
<p>六十三岁。退休三年。妻子十年前病逝——苏鹤是他的独女。客厅的墙上挂满了苏鹤从小到大获得的折纸比赛奖状——从七岁的"市级少儿折纸大赛一等奖"到去年的"东京国际折纸艺术展金奖"。奖状按照时间顺序排列——像是在讲述一个父亲全部的骄傲。</p>
<p>"你女儿在纸鹤上写了'R-23:15'。"你说。"R代表铁路。23:15是K-7714——一趟幽灵货车。只有铁路调度员才知道的时刻表。你曾经是漠河段的调度员。"</p>
<p>苏建国弹了一下烟灰。他的手很稳——一个在铁路系统工作了三十五年的人的手。"我知道那趟车。每天一趟——运木材的。但它不停北陲岬——它从漠河直接到满洲里。北陲岬的货运支线已经废弃七年了。时刻表上写的是经停——实际上它不停。"</p>
<p>"废弃七年——但铁路还在。货车可以停——只要有调度指令。"</p>
<p>苏建国沉默了。烟灰掉在他的工装裤上——他没有弹掉。半晌——他说："苏鹤要结婚了。搬到南方——珠海。韩冬在那里有一个记者站。她说——'爸，我每年冬天回来看你。'每年冬天——不是每个月，不是每个节日。一年一次。我三十五年的女儿——一年见一次。"</p>

<p>"苏鹤是我的——她是我这辈子遇到的最好的人。"他的开场白是典型的情侣式悼词。但你注意到他用了过去式——"曾经是"——在遗体被发现不到二十四小时的时候。大多数人还需要更长的时间来适应时态的变化。</p>

<p>韩冬吞了口唾沫。"对。我不是去拍落日。我是去找苏鹤。客车开出二十分钟后——我突然觉得不对。她答应和我一起乘末班车——她从来没迟到过。我让司机停车——我说我要回去找她。司机说不行——客车要准时到站。我求了他十分钟——他最后说——他可以在路边等我——但我必须自己走回去。"</p>

<p>韩冬的手在膝盖上攥成了拳头。他的登山靴在地板上留下了一道雪泥的痕迹。</p>

// Branch C: 曲小雪
{location:'曲小雪·灯塔管理处',text:`
<p>曲小雪是一个皮肤被漠河的风吹得粗粝的女人——三十五岁，手指短而有力——一双常年与铁锁、机油、棉绳打交道的手。灯塔管理员的日常工作枯燥而体力化——检查螺栓、更换灯油（虽然灯已不再亮）、在风雪中爬上三十米高的铁架。这不是一份女人通常会选的工作——但曲小雪做了七年。</p>
<p>"苏鹤是我的朋友。"她说。语气没有任何修饰——像是在陈述一个天气事实——"我们认识了七年。她每年冬天都会来灯塔。她说——'漠河的雪是全世界最白的纸'——她在这里折纸鹤。"</p>
<p>"你那天也去了灯塔。"</p>
<p>"我每天都在灯塔。这是我的工作。"</p>
<p>"苏鹤的父亲和未婚夫也来了。三个访客——加上苏鹤——四个人在灯塔。然后下午四点——三个人坐客车走了。苏鹤被发现死在灯塔顶楼。她说你留下了什么——吗？"</p>
<p>曲小雪沉默了一会儿。然后她打开抽屉——里面是一个铁盒子——里面是几十只纸鹤——各种颜色——全部是苏鹤折的。"她每次来都会折一只纸鹤留给我。七年——七十八只。"她拿起最上面那只——赤红色和纸。"但这只——不是我收到的。这只沾了血。我在她尸体旁边看到它的时候——我知道这不是给我的。这是给凶手的。"</p>
<p>"'R-23:15'——你能看懂吗？"</p>
<p>"能。"曲小雪说。"R是铁路。我父亲也是铁路职工——和苏建国一个段。23:15——是K-7714货运列车。我从小在铁路边上长大——听得懂货运列车的汽笛声。但我不会解她留下的暗号——因为这个暗号不是写给<b>听</b>得懂的人——是写给<b>看得懂</b>的人。写给她父亲。"</p>
`,scene:'曲小雪的铁盒——七十八只纸鹤。每一只的翅膀内侧都有苏鹤的签名和日期。赤红色的那只是第七十九只——也是唯一一只没有日期、只有暗号的。也是唯一一只沾了血的。',defaultNext:6},

{location:'晚上21:00·线索汇总',text:`
<p>三人的证词在你的白板上形成了一幅拼图。</p>
<p><b>苏建国：</b>知道幽灵货车。知道废弃隧道。案发后晚了80分钟回家——这80分钟恰好对应步行穿过隧道+等待23:15货车的时间。动机——女儿要嫁到南方，他将失去晚年的依靠。在审讯中——他说苏鹤"一年见一次"时的语气——是一种被遗弃的愤怒。</p>
<p><b>韩冬：</b>客车开到半路下车往回走——自称走到隧道口又折返。GPS证实他确实走了往返六公里——但只到隧道口——没有穿过去。如果他没有穿过隧道——他不可能在杀死苏鹤后赶上23:15的幽灵货车。除非——他不需要幽灵货车——因为他有客车等他。</p>
<p><b>曲小雪：</b>有灯塔所有钥匙——知道棉绳存放处。知道隧道。会打单套结（铁路家庭背景）。但她没有明显的动机——她和苏鹤是七年好友。而且她主动交出了纸鹤铁盒——如果她是凶手，她不会提醒你去注意暗号。</p>
<p>你拿起电话——打给铁路调度中心。K-7714货运列车——1月7日——是否在23:15经停了北陲岬货运支线？回答："<b>经停了。调度指令编号0174——发出人是苏建国。他说有一批紧急物资需要在北陲岬装车。</b>"</p>
`,defaultNext:7},
{location:'废弃保线隧道·实地踏勘',text:`
<p>第二天清晨——你亲自走了一遍废弃隧道。从灯塔向东800米——穿过一片积雪的白桦林——隧道入口赫然出现在山体上。入口被锈蚀的铁栅栏半封着——但其中一扇被推开了一个人宽的缝隙。栅栏上的铁锈被刮掉了——新鲜的金属划痕。</p>
<p>你走进隧道。黑暗——潮湿——脚底是碎石和冰。手电筒的光在隧道壁上投下长长的影子。800米——步行约10分钟。出口在山的另一侧——距漠河火车站货运站台仅200米。</p>
<p>在隧道中段——你在碎石地面上发现了一个脚印——不完整——但足以辨认：44码——登山靴——鞋底纹路与韩冬的鞋一致。这证实了韩冬确实进过隧道——至少走到了中段。</p>
<p>但在接近出口的位置——你发现了另一个脚印：布鞋——约41码——平底——鞋底纹路磨损严重。这个尺码——比苏建国的正常鞋码（42码）小一号——但布鞋在雪水中会收缩——一双在雪水中走了800米的布鞋——收缩约半码到一码。</p>
<p>你在出口处停下来。铁路货运站台就在前方200米。这里——在1月7日晚上——一个人在零下四十度的寒风中站着，等待那趟没有乘客知道的幽灵货车。</p>
`,scene:'隧道中的两组痕迹：①隧道口-中段：44码登山靴足迹（韩冬——他说自己走到隧道口——实际上他走进去了至少400米）。②中段-出口：约41码布鞋足迹（收缩后的尺寸——原鞋约42码——苏建国的鞋码）。两组足迹方向一致——从隧道口走向出口方向——没有返回的足迹。',defaultNext:8},
{location:'最终侦讯·苏建国',text:`
<p>你把苏建国带到废弃隧道的出口。铁路就在前方。寒风中——你能听到远处货运列车轮轨撞击铁轨的声音——有节奏的、低沉的——下午的货运列车正在编组。</p>
<p>"你发出了调度指令编号0174——让K-7714在23:15经停北陲岬货运支线。'紧急物资'——是什么？"</p>
<p>苏建国没有回答。他的眼睛看着铁轨的方向——那种凝视——是一个在铁路系统工作了三十五年的人才会有的凝视。铁轨在他的注视下延伸向远方——消失在地平线上。</p>
<p>"我在灯塔一楼等她。"他终于开口了。"她说——再给她半小时——她在折最后一只纸鹤。我等到四点半——她还没下来。我上了楼——"他的声音断了——但只断了片刻。"她已经死了。纸鹤在她旁边——沾了血——上面写着'R-23:15'。我的女儿——在生命的最后一刻——用一张纸和一支钢笔——给我写了一个暗号。不是凶手的名字——她知道我打不过任何人。她写的是——<b>'爸爸，坐这趟车回家吧。客车已经走了。别冻着。'</b>"</p>
<p>风吹过铁轨——发出尖锐的呼啸声。苏建国的眼泪在眼眶中转了一圈——没掉下来——被寒风吹干了。</p>
<p>"我给她松了绑——把绳子丢在地上——抱了抱她。然后我沿着铁路走到隧道——穿过山——在23:15上了货车。我没有报警——因为我知道——如果我报警——他们就会发现我的调度指令——我回家晚了80分钟——我的足迹——我的——"他停住了。</p>
<p>"你没有杀她。"你说。</p>
<p>"我没有。但我发现她的时候——已经没有人能救她了。纸鹤上的字——是她用最后的力气写的。不是求救——是<b>告别</b>。"</p>
`,defaultNext:9},
{location:'真相还原',text:`

<p>15:30——苏鹤在灯塔顶楼折最后一只纸鹤——这只纸鹤是给父亲的（她每次来都给父亲折一只——七十八只了——这只是第七十九只）。</p>
<p>16:00左右——凶手进入灯塔顶楼。用灯塔机房的棉绳从后面勒住了苏鹤的脖子。苏鹤挣扎——棉绳勒入颈部。凶手将她的双手反绑——用单套结（铁路系统的标准打结法——凶手和铁路有关）。</p>
<p>16:05——凶手离开。苏鹤仍然活着——但颈部被勒——呼吸困难——双手被绑。她用牙齿撕开那张赤红色的和纸——用钢笔——在极度困难的情况下——写下"R-23:15"。不是凶手的名字——她知道写出来也没人看得懂。她写的是给她父亲的：<b>"走幽灵货车——23:15——别冻死在雪地里。"</b></p>
<p>16:18——末班客车离开。曲小雪、韩冬、苏建国（以为女儿还在楼上折纸）都上了车。</p>
<p>16:38——韩冬下车往回走——走到隧道口——在黑暗中感到恐惧——折返。</p>
<p>约16:40-17:00之间——苏鹤因窒息死亡。</p>
<p>约17:00左右——苏建国（客车走了之后？不——他应该在车上）——不对。时间线的漏洞在于——苏建国是什么时候从客车上离开的？</p>
<p><b>苏建国根本不在客车上。</b>他没有上车。他让其他人先走——说"我等女儿一起——我们走回去"——实际上他等了一会儿上楼发现了女儿的尸体。韩冬说的"客车在路边等了80分钟"——司机等待的人不是韩冬一个。苏建国也不在车上。</p>
`,defaultNext:10},
